<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:,">
    <title>Mood Compass 情緒紀錄與自我照護儀表板</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body style="--accent:#2f855a;--accent2:#db2777;--accent3:#2563eb;--dark:#102018">
    <main class="shell">
      <aside class="rail">
        <section class="brand">
          <span class="brand-mark">MC</span>
          <div>
            <strong>Mood Compass</strong>
            <small>把每日感受整理成可回顧的生活訊號</small>
          </div>
        </section>
        <nav class="nav" id="nav"></nav>
        <section class="operator">
          <span>操作身分</span>
          <strong>全權限展示</strong>
          <small>免登入，公開版使用模擬資料與完整操作流程。</small>
        </section>
      </aside>
      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">115504 專業化展示版</p>
            <h1 id="viewTitle"></h1>
          </div>
          <div id="statusLine" class="status-line"></div>
        </header>
        <section id="app"></section>
      </section>
    </main>
    <div class="toast" id="toast"></div>
    <script src="app.js"></script>
  </body>
</html>
